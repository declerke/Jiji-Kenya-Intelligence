name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly scan every Monday at 07:00 UTC
    - cron: '0 7 * * 1'

jobs:
  python-security:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on installed packages
        # GHSA-w75w-9qv4-j5xj: dbt-common path traversal CVE — fix requires dbt-core 1.34+ upgrade
        run: pip-audit --local --output=json -o pip-audit-results.json --ignore-vuln GHSA-w75w-9qv4-j5xj || true

      - name: Display audit results
        run: |
          pip-audit --local --ignore-vuln GHSA-w75w-9qv4-j5xj || echo "Vulnerabilities found — review report above"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

  node-security:
    name: Node.js Dependency Audit (Evidence.dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Evidence.dev dependencies
        working-directory: reports
        run: npm install --legacy-peer-deps --ignore-scripts && npm rebuild duckdb

      - name: Run npm audit
        working-directory: reports
        run: npm audit --audit-level=moderate || echo "npm audit found issues — review above"
